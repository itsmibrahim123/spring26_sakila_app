name: Sakila Deployment Workflow

on:
  workflow_run:
    workflows: ["Sakila CI Pipeline"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '.gitignore'

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Print Environment Variables
        run: |
          echo "Deploying to STAGING environment"
          echo "IMAGE_TAG: staging-${{ github.sha }}"
          
      - name: Simulate Staging Deployment
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:staging .
          echo "Running Docker image with staging tag..."
          
      - name: Deployment Summary
        run: |
          echo "### :rocket: Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          
      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Simulate Production Deployment
        run: echo "Deploying highly optimized build to PRODUCTION server..."
        
      - name: Notification
        run: echo "Slack notification: Deployment to production successful"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v2026.04.27-${{ github.run_number }}
          release_name: Release v2026.04.27
          draft: false
          prerelease: false