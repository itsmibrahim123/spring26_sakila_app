name: Deployment Workflow

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Print Environment Variables
        run: |
          echo "Deploying to STAGING environment"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          
      - name: Simulate Staging Deployment
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:staging .
          echo "Running Docker image with staging tag..."
          
      - name: Deployment Summary
        run: |
          echo "### :rocket: Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          
      - name: Slack Notification
        run: echo "Slack notification - Deployment to staging successful"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Simulate Production Deployment
        run: echo "Deploying highly optimized build to PRODUCTION server..."
        
      - name: Create Release Version Tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
        
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ env.date }} --title "Release v${{ env.date }}" --notes "Production deployment triggered by commit ${{ github.sha }}"
            
      - name: Slack Notification
        run: echo "Slack notification - Deployment to production successful"