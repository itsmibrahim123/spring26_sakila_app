name: Sakila Deployment Workflow

on:
  workflow_run:
    workflows: ["Sakila CI Pipeline"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  deploy-staging:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "IMAGE_TAG: staging-${{ github.sha }}"
          echo "Environment Variables: MYSQL_HOST=db, APP_PORT=5000"
          docker build -t sakila-app:staging .

      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

      - name: Generate Deployment Summary
        run: |
          echo "### Staging Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "* **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "* **Environment:** Staging" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Simulating production deployment message..."

      - name: Notification
        run: echo "Slack notification: Deployment to production successful"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v2026.04.27-${{ github.run_number }}
          release_name: Release v2026.04.27
          draft: false
          prerelease: false