name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]
  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only run if CI passed (when triggered by workflow_run)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print staging environment variables
        run: |
          echo "================================================"
          echo "  STAGING DEPLOYMENT"
          echo "================================================"
          echo "Branch:       ${{ github.ref_name }}"
          echo "Commit SHA:   ${{ github.sha }}"
          echo "Actor:        ${{ github.actor }}"
          echo "Repository:   ${{ github.repository }}"
          echo "Run ID:       ${{ github.run_id }}"
          echo "================================================"

      - name: Simulate staging Docker deployment
        run: |
          echo "Pulling image sakila-app:latest for staging..."
          echo "docker run -d --name sakila-staging -p 5001:5000 sakila-app:${{ github.sha }}"
          echo "Staging container started successfully."

      - name: Write deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | Staging |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Staging deployment completed successfully.**" >> $GITHUB_STEP_SUMMARY

      - name: Notify staging success
        run: |
          echo "Slack notification: Deployment to STAGING successful ✅"
          echo "Commit: ${{ github.sha }} by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print production environment variables
        run: |
          echo "================================================"
          echo "  PRODUCTION DEPLOYMENT"
          echo "================================================"
          echo "Branch:       ${{ github.ref_name }}"
          echo "Commit SHA:   ${{ github.sha }}"
          echo "Actor:        ${{ github.actor }}"
          echo "Repository:   ${{ github.repository }}"
          echo "Run ID:       ${{ github.run_id }}"
          echo "================================================"

      - name: Simulate production Docker deployment
        run: |
          echo "Pulling image sakila-app:latest for production..."
          echo "docker run -d --name sakila-prod -p 5000:5000 sakila-app:${{ github.sha }}"
          echo "Production container started successfully."

      - name: Generate version tag from current date
        id: version
        run: |
          VERSION="v$(date -u '+%Y.%m.%d')"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## 🎉 Production Release ${{ steps.version.outputs.tag }}

            **Commit:** `${{ github.sha }}`
            **Deployed by:** ${{ github.actor }}
            **Date:** ${{ steps.version.outputs.tag }}

            ### Changes
            Automated production release from CI/CD pipeline.

            ### Deployment Notes
            - Staging verified ✅
            - Security scan completed ✅
            - All tests passed ✅
          draft: false
          prerelease: false

      - name: Write production deployment summary
        run: |
          echo "## 🎯 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Production deployment completed. GitHub Release created.**" >> $GITHUB_STEP_SUMMARY

      - name: Notify production success
        run: |
          echo "Slack notification: Deployment to PRODUCTION successful 🚀"
          echo "Version: ${{ steps.version.outputs.tag }} | Commit: ${{ github.sha }}"