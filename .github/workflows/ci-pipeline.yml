name: Sakila CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app
  MYSQL_DATABASE: sakila
  MYSQL_ROOT_PASSWORD: root

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --ignore=E501,W503 --count --select=E,F,W,C,9 --show-source --statistics

  test:
    name: Unit Tests with MySQL
    needs: lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest mysql-connector-python
          
      - name: Import Sakila Schema and Data
        run: |
          # Downloading Sakila SQL files from official source
          wget https://downloads.mysql.com/docs/sakila-db.tar.gz
          tar -xvf sakila-db.tar.gz
          # Importing into the service container (host is localhost in Actions)
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} < sakila-db/sakila-data.sql
          
      - name: Run pytest
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          DB_NAME: ${{ env.MYSQL_DATABASE }}
        run: pytest -v

  build:
    name: Docker Build & Verification
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
        
      - name: Verify Image
        run: docker images
        
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name smoke-test ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl --retry 5 --retry-connrefused http://localhost:5000 || wget -qO- http://localhost:5000
          docker stop smoke-test

  security-scan:
    name: Image Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Image for Scan
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report.txt'
          
      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt